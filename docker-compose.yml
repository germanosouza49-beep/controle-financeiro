version: '3.8'

services:
  server:
    build: ./server
    ports:
      - '3001:3001'
    env_file:
      - ./server/.env
    volumes:
      - ./server/src:/app/src
    depends_on:
      - supabase-db

  supabase-db:
    image: supabase/postgres:15.1.1.61
    ports:
      - '54322:5432'
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fincontrol
    volumes:
      - supabase-data:/var/lib/postgresql/data

volumes:
  supabase-data:
